name: Sync Notion Budget Data

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = JST 6:00
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync webhook
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" -X POST \
            "${{ secrets.SYNC_ENDPOINT_URL }}" \
            -H "X-Sync-Token: ${{ secrets.SYNC_SECRET_TOKEN }}")

          echo "HTTP status: $response"
          cat /tmp/response.json

          if [ "$response" -ne 200 ]; then
            echo "Sync failed"
            exit 1
          fi
