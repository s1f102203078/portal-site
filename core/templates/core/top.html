<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .prose h2 { font-size: 1.25rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        .prose h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .prose p { margin-bottom: 1rem; line-height: 1.7; }
        .prose ul, .prose ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.25rem; }
        .prose code { background: #f3f4f6; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-size: 0.9em; }
        .prose pre { background: #1f2937; color: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
        .prose pre code { background: none; padding: 0; }
        .prose img { border-radius: 0.5rem; margin: 1rem 0; }
        .prose table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
        .prose th, .prose td { border: 1px solid #e5e7eb; padding: 0.5rem; text-align: left; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <header class="border-b bg-white">
        <nav class="max-w-3xl mx-auto px-4 py-4 flex justify-between">
            <a href="{% url 'core:top' %}" class="font-bold">Portal</a>
            <div class="text-sm flex items-center gap-4">
                <a href="{% url 'core:learning_list' %}">学習ログ</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard:summary' %}">ダッシュボード</a>
                    {{ user.username }}さん
                    <form method="post" action="{% url 'accounts:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="text-gray-500">ログアウト</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}">ログイン</a>
                {% endif %}
            </div>
        </nav>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-10">
        {% block content %}
        <section>
            <h1 class="text-2xl font-bold mb-4">About</h1>
            <p class="text-gray-600">
                INIAD在学中。SE/ITコンサル/PdMを軸に就活中。
                このサイトは自作の学習・実務系ポータルです。
            </p>
        </section>
        {% endblock %}
    </main>
</body>
</html>
